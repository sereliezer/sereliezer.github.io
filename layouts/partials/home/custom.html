<div id="page">
  <section>
    <h2 class="mt-8 text-2xl font-extrabold">Recent publications</h2>
    <ul>
      {{ range where .Site.RegularPages "Section" "publications" | first 10 }}
        <li>
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
          {{ with .Date }}<small> — {{ .Format "2006-01-02" }}</small>{{ end }}
        </li>
      {{ end }}
    </ul>
  </section>
</div>
